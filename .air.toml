root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main.exe ./cmd/api/main.go"
  
  bin = "tmp\\main.exe"
  
  full_bin = ".\\tmp\\main.exe"
  
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "storage"]
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  exclude_regex = ["_test.go"]
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true